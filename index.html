    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>

        let currentPortfolioIndex = 0;

        function updatePortfolio() {
            const container = document.getElementById('portfolio-container');
            container.style.opacity = '0';

            setTimeout(() => {
                const item = portfolioItems[currentPortfolioIndex];
                document.getElementById('portfolio-review').innerHTML = currentLang === 'nl' ? item.reviewNL : item.reviewEN;
                document.getElementById('portfolio-customer').innerText = item.customer;
                document.getElementById('portfolio-desktop-img').src = item.desktopImg;
                document.getElementById('portfolio-mobile-img').src = item.mobileImg;
                document.getElementById('portfolio-link').href = item.websiteUrl;
                document.getElementById('portfolio-desktop-link').href = item.websiteUrl;
                document.getElementById('portfolio-mobile-link').href = item.websiteUrl;
                container.style.opacity = '1';
            }, 300);
        }

        function nextPortfolio() {
            currentPortfolioIndex = (currentPortfolioIndex + 1) % portfolioItems.length;
            updatePortfolio();
        }

        function prevPortfolio() {
            currentPortfolioIndex = (currentPortfolioIndex - 1 + portfolioItems.length) % portfolioItems.length;
            updatePortfolio();
        }

        // Swipe Functionality for Mobile (Optimized with Passive listener)
        const sliderContainer = document.getElementById('portfolio-container');
        let touchstartX = 0;

        sliderContainer.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        }, { passive: true });

        sliderContainer.addEventListener('touchend', e => {
            let touchendX = e.changedTouches[0].screenX;
            if (touchendX < touchstartX - 50) nextPortfolio(); 
            if (touchendX > touchstartX + 50) prevPortfolio(); 
        }, { passive: true });

        function updateLanguage(){
            i18nElements.forEach(el=>{
                const key=el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.innerHTML=translations[currentLang][key]; 
                }
            });
            formName.placeholder=currentLang==='nl'?"John Doe":"John Doe";
            formCompany.placeholder=currentLang==='nl'?"Fyxo B.V.":"Fyxo Inc.";
            formEmail.placeholder=currentLang==='nl'?"info@voorbeeld.nl":"info@example.com";
            formMsg.placeholder=currentLang==='nl'?"Bijv: We willen de conversie verhogen met 30%...":"E.g. We want to increase conversion by 30%...";
            
            // Re-populate custom dropdown options
            opt1.innerText = translations[currentLang]['opt-1'];
            opt2.innerText = translations[currentLang]['opt-2'];
            opt3.innerText = translations[currentLang]['opt-3'];
            opt4.innerText = translations[currentLang]['opt-4'];

            langText.innerText=currentLang==='nl'?'EN':'NL';
            if(langTextMobile) langTextMobile.innerText=currentLang==='nl'?'EN':'NL';
            
            updatePortfolio();
        }
        
        function handleLangToggle() {
            currentLang=currentLang==='nl'?'en':'nl';
            updateLanguage();
        }

        // Optimized Scroll Listener via RequestAnimationFrame
        let scrollTicking = false;
        window.addEventListener('scroll', () => {
            if (!scrollTicking) {
                window.requestAnimationFrame(() => {
                    let current = '';
                    sections.forEach(section => {
                        if (window.pageYOffset >= section.offsetTop - 120) {
                            current = section.getAttribute('id');
                        }
                    });
                    
                    navLinks.forEach(link => {
                        link.classList.remove('active-link', 'text-brand-blue');
                        if(link.getAttribute('href').includes(current)){
                            if (link.classList.contains('nav-link')) {
                                link.classList.add('active-link');
                            } else {
                                link.classList.add('text-brand-blue');
                                link.classList.remove('text-muted');
                            }
                        } else {
                            if (link.classList.contains('mobile-nav-link')) {
                                link.classList.remove('text-brand-blue');
                                link.classList.add('text-muted');
                            }
                        }
                    });
                    scrollTicking = false;
                });
                scrollTicking = true;
            }
        });

        // Pages Hash Navigation logic
        function showThankYouPage() {
            document.querySelectorAll('body > nav, body > section, body > footer').forEach(el => {
                if (el.id !== 'thank-you-section') {
                    el.style.display = 'none';
                }
            });
            const tySection = document.getElementById('thank-you-section');
            if (tySection) {
                tySection.classList.remove('hidden');
                tySection.style.display = 'flex';
                window.scrollTo(0, 0);
            }
        }

        function returnToHome() {
            document.querySelectorAll('body > nav, body > section, body > footer').forEach(el => {
                if (el.id !== 'thank-you-section') {
                    el.style.display = '';
                }
            });
            const tySection = document.getElementById('thank-you-section');
            if (tySection) {
                tySection.classList.add('hidden');
                tySection.style.display = 'none';
            }
            window.scrollTo(0, 0);
        }

        window.addEventListener('load', function() {
            if (window.location.hash === '#thank-you-section') {
                showThankYouPage();
            }
        });

        window.addEventListener('hashchange', function() {
            if (window.location.hash === '#thank-you-section') {
                showThankYouPage();
            } else if (window.location.hash === '#home' || window.location.hash === '') {
                returnToHome();
            }
        });
    </script>
